apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: event
type: Opaque
stringData:
  # REQUIRED by auth-service, booking-service, event-service
  # Replace with your real production values before applying.
  MONGO_URI: "mongodb://REPLACE_ME:27017"
  JWT_SECRET: "REPLACE_ME_WITH_STRONG_SECRET"
